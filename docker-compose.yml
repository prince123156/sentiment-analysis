services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  sentiment-service:
    build: ./sentiment-service
    restart: unless-stopped
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
      - sentiment-service
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/sentiment_chat
      JWT_SECRET: change_this_secret
      CLIENT_URL: http://localhost:5173
      SENTIMENT_API_URL: http://sentiment-service:8000
      NEGATIVE_ALERT_THRESHOLD: 3
    ports:
      - "5000:5000"

volumes:
  mongo-data:
